<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskFlow | Nowoczesny menedżer zadań</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }

        :root {
            --bg: #f4f6fb;
            --surface: #ffffff;
            --text: #1a2c3e;
            --text-light: #5a6e85;
            --border: #e2e8f0;
            --primary: #4f46e5;
            --primary-dark: #4338ca;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
            --shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            --shadow-lg: 0 20px 25px -5px rgba(0,0,0,0.1);
        }

        body.dark {
            --bg: #0f172a;
            --surface: #1e293b;
            --text: #f1f5f9;
            --text-light: #94a3b8;
            --border: #334155;
        }

        body {
            background: var(--bg);
            color: var(--text);
            transition: all 0.3s ease;
        }

        /* Header */
        .header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1rem 0;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 1.5rem;
            font-weight: 800;
        }

        .logo span {
            background: linear-gradient(135deg, var(--primary), #8b5cf6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .theme-toggle, .add-task-btn {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            cursor: pointer;
            color: var(--text);
            font-weight: 500;
            transition: all 0.2s;
        }

        .add-task-btn {
            background: var(--primary);
            color: white;
            border: none;
        }

        .add-task-btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        /* Stats */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1rem;
            margin: 2rem 0;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.2rem;
            text-align: center;
            transition: all 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--primary);
        }

        .stat-label {
            color: var(--text-light);
            font-size: 0.85rem;
            margin-top: 0.3rem;
        }

        .progress-bar {
            margin-top: 0.8rem;
            height: 6px;
            background: var(--border);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: var(--success);
            border-radius: 10px;
            transition: width 0.3s;
        }

        /* Filtry i wyszukiwanie */
        .filters-bar {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .filter-group {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .filter-chip {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }

        .filter-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .search-box input {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 40px;
            background: var(--surface);
            color: var(--text);
            width: 250px;
        }

        .sort-select {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border);
            border-radius: 40px;
            background: var(--surface);
            color: var(--text);
        }

        /* Lista zadań */
        .tasks-header {
            display: grid;
            grid-template-columns: 40px 1fr 120px 100px 100px 50px;
            gap: 1rem;
            padding: 0.8rem 1rem;
            background: var(--surface);
            border-radius: 12px;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.85rem;
            color: var(--text-light);
            border: 1px solid var(--border);
        }

        .task-item {
            display: grid;
            grid-template-columns: 40px 1fr 120px 100px 100px 50px;
            gap: 1rem;
            align-items: center;
            padding: 1rem;
            background: var(--surface);
            border-radius: 12px;
            margin-bottom: 0.5rem;
            border: 1px solid var(--border);
            transition: all 0.2s;
            animation: slideIn 0.2s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .task-item:hover {
            transform: translateX(4px);
            border-color: var(--primary);
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: var(--success);
        }

        .task-title {
            font-weight: 600;
        }

        .task-title.completed {
            text-decoration: line-through;
            color: var(--text-light);
        }

        .category-badge {
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.75rem;
            font-weight: 600;
            text-align: center;
            width: fit-content;
        }

        .category-work { background: #3b82f620; color: #3b82f6; }
        .category-home { background: #10b98120; color: #10b981; }
        .category-study { background: #8b5cf620; color: #8b5cf6; }
        .category-personal { background: #f59e0b20; color: #f59e0b; }

        .priority-high { color: var(--danger); font-weight: 600; }
        .priority-medium { color: var(--warning); font-weight: 600; }
        .priority-low { color: var(--success); font-weight: 600; }

        .status-badge {
            padding: 0.2rem 0.6rem;
            border-radius: 30px;
            font-size: 0.7rem;
            font-weight: 600;
            text-align: center;
            width: fit-content;
        }
        .status-todo { background: #64748b20; color: #64748b; }
        .status-progress { background: #3b82f620; color: #3b82f6; }
        .status-done { background: #10b98120; color: #10b981; }

        .task-date {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .task-actions {
            display: flex;
            gap: 0.5rem;
        }

        .task-actions button {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 1.1rem;
            opacity: 0.6;
            transition: opacity 0.2s;
        }

        .task-actions button:hover {
            opacity: 1;
        }

        .edit-btn { color: var(--info); }
        .delete-btn { color: var(--danger); }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--surface);
            width: 90%;
            max-width: 500px;
            border-radius: 28px;
            padding: 1.8rem;
            animation: modalIn 0.2s ease;
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        .modal-content h2 {
            margin-bottom: 1.2rem;
        }

        .modal-content input, .modal-content select, .modal-content textarea {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border);
            border-radius: 16px;
            background: var(--bg);
            color: var(--text);
            font-size: 0.9rem;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: flex-end;
        }

        .empty-state {
            text-align: center;
            padding: 4rem;
            color: var(--text-light);
        }

        .empty-state .emoji {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 900px) {
            .tasks-header { display: none; }
            .task-item {
                grid-template-columns: 1fr;
                gap: 0.6rem;
            }
            .task-item .task-checkbox { order: 1; }
            .task-item .task-title { order: 2; }
            .task-item .category-badge { order: 3; }
            .task-item .priority-high { order: 4; }
            .task-item .status-badge { order: 5; }
            .task-item .task-date { order: 6; }
            .task-item .task-actions { order: 7; justify-content: flex-end; }
        }

        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="container">
        <div class="header-content">
            <div class="logo">
                📋 <span>TaskFlow</span>
            </div>
            <div class="header-actions">
                <button class="theme-toggle" id="themeToggle">🌙</button>
                <button class="add-task-btn" id="openAddModal">+ Nowe zadanie</button>
            </div>
        </div>
    </div>
</div>

<div class="container">
    <!-- Statystyki -->
    <div class="stats-grid" id="statsGrid">
        <div class="stat-card">
            <div class="stat-value" id="totalTasks">0</div>
            <div class="stat-label">Wszystkie zadania</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="completedTasks">0</div>
            <div class="stat-label">Zrealizowane</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="pendingTasks">0</div>
            <div class="stat-label">Do zrobienia</div>
        </div>
        <div class="stat-card">
            <div class="stat-label">Postęp</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill" style="width: 0%"></div>
            </div>
            <div class="stat-value" id="progressPercent" style="font-size: 1.2rem;">0%</div>
        </div>
    </div>

    <!-- Filtry -->
    <div class="filters-bar">
        <div class="filter-group" id="categoryFilters">
            <button class="filter-chip active" data-cat="all">Wszystkie</button>
            <button class="filter-chip" data-cat="work">💼 Praca</button>
            <button class="filter-chip" data-cat="home">🏠 Dom</button>
            <button class="filter-chip" data-cat="study">📚 Nauka</button>
            <button class="filter-chip" data-cat="personal">❤️ Osobiste</button>
        </div>
        <div class="filter-group" id="statusFilters">
            <button class="filter-chip active" data-status="all">Wszystkie</button>
            <button class="filter-chip" data-status="todo">📋 Do zrobienia</button>
            <button class="filter-chip" data-status="progress">⚡ W trakcie</button>
            <button class="filter-chip" data-status="done">✅ Zrobione</button>
        </div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Szukaj zadania...">
        </div>
        <select id="sortSelect" class="sort-select">
            <option value="date-asc">Data ↑</option>
            <option value="date-desc">Data ↓</option>
            <option value="priority">Priorytet</option>
        </select>
    </div>

    <!-- Lista zadań -->
    <div class="tasks-header">
        <div></div>
        <div>Zadanie</div>
        <div>Kategoria</div>
        <div>Priorytet</div>
        <div>Status</div>
        <div>Termin</div>
        <div></div>
    </div>
    <div id="tasksList"></div>
</div>

<footer>
    <p>TaskFlow – Nowoczesny menedżer zadań | Zapisywane automatycznie</p>
</footer>

<!-- Modal dodawania/edycji -->
<div id="taskModal" class="modal">
    <div class="modal-content">
        <h2 id="modalTitle">➕ Dodaj zadanie</h2>
        <input type="text" id="taskTitle" placeholder="Nazwa zadania" required>
        <textarea id="taskDesc" placeholder="Opis (opcjonalnie)" rows="3"></textarea>
        <select id="taskCategory">
            <option value="work">💼 Praca</option>
            <option value="home">🏠 Dom</option>
            <option value="study">📚 Nauka</option>
            <option value="personal">❤️ Osobiste</option>
        </select>
        <select id="taskPriority">
            <option value="low">🟢 Niski</option>
            <option value="medium">🟡 Średni</option>
            <option value="high">🔴 Wysoki</option>
        </select>
        <select id="taskStatus">
            <option value="todo">📋 Do zrobienia</option>
            <option value="progress">⚡ W trakcie</option>
            <option value="done">✅ Zrobione</option>
        </select>
        <input type="date" id="taskDate">
        <div class="modal-buttons">
            <button class="theme-toggle" id="closeModal">Anuluj</button>
            <button class="add-task-btn" id="saveTask">Zapisz</button>
        </div>
    </div>
</div>

<script>
    // ==================== DANE ====================
    let tasks = [];
    let editingId = null;
    let currentCategoryFilter = "all";
    let currentStatusFilter = "all";
    let currentSort = "date-asc";
    let searchQuery = "";

    // ==================== PRZYKŁADOWE ZADANIA ====================
    const sampleTasks = [
        { id: 1, title: "Zakończyć projekt portfolio", description: "Dodać wszystkie projekty i wrzucić na Netlify", category: "work", priority: "high", status: "progress", date: "2026-06-15" },
        { id: 2, title: "Kupić artykuły spożywcze", description: "Mleko, jajka, chleb, warzywa", category: "home", priority: "medium", status: "todo", date: "2026-06-10" },
        { id: 3, title: "Nauczyć się Reacta", description: "Hooks, context, router", category: "study", priority: "high", status: "progress", date: "2026-06-20" },
        { id: 4, title: "Zadzwonić do mamy", description: "", category: "personal", priority: "low", status: "done", date: "2026-06-05" },
        { id: 5, title: "Przygotować prezentację", description: "Dla klienta", category: "work", priority: "high", status: "todo", date: "2026-06-12" },
    ];

    // ==================== FUNKCJE POMOCNICZE ====================
    function loadTasks() {
        const saved = localStorage.getItem("taskflow_tasks");
        if (saved && JSON.parse(saved).length > 0) {
            tasks = JSON.parse(saved);
        } else {
            tasks = sampleTasks;
            saveTasks();
        }
        renderAll();
    }

    function saveTasks() {
        localStorage.setItem("taskflow_tasks", JSON.stringify(tasks));
    }

    function getNextId() {
        return tasks.length > 0 ? Math.max(...tasks.map(t => t.id)) + 1 : 1;
    }

    // ==================== FILTROWANIE I SORTOWANIE ====================
    function getFilteredTasks() {
        let filtered = [...tasks];
        
        // Filtrowanie po kategorii
        if (currentCategoryFilter !== "all") {
            filtered = filtered.filter(t => t.category === currentCategoryFilter);
        }
        
        // Filtrowanie po statusie
        if (currentStatusFilter !== "all") {
            filtered = filtered.filter(t => t.status === currentStatusFilter);
        }
        
        // Wyszukiwanie
        if (searchQuery) {
            const query = searchQuery.toLowerCase();
            filtered = filtered.filter(t => t.title.toLowerCase().includes(query) || (t.description && t.description.toLowerCase().includes(query)));
        }
        
        // Sortowanie
        if (currentSort === "date-asc") {
            filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
        } else if (currentSort === "date-desc") {
            filtered.sort((a, b) => new Date(b.date) - new Date(a.date));
        } else if (currentSort === "priority") {
            const priorityOrder = { high: 0, medium: 1, low: 2 };
            filtered.sort((a, b) => priorityOrder[a.priority] - priorityOrder[b.priority]);
        }
        
        return filtered;
    }

    // ==================== STATYSTYKI ====================
    function updateStats() {
        const total = tasks.length;
        const completed = tasks.filter(t => t.status === "done").length;
        const pending = tasks.filter(t => t.status !== "done").length;
        const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
        
        document.getElementById("totalTasks").innerText = total;
        document.getElementById("completedTasks").innerText = completed;
        document.getElementById("pendingTasks").innerText = pending;
        document.getElementById("progressFill").style.width = percent + "%";
        document.getElementById("progressPercent").innerText = percent + "%";
    }

    // ==================== RENDEROWANIE LISTY ====================
    function renderTasks() {
        const filtered = getFilteredTasks();
        const container = document.getElementById("tasksList");
        
        if (filtered.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="emoji">📭</div>
                    <h3>Brak zadań</h3>
                    <p>Dodaj nowe zadanie klikając przycisk "+ Nowe zadanie"</p>
                </div>
            `;
            return;
        }
        
        container.innerHTML = filtered.map(task => {
            const categoryClass = `category-${task.category}`;
            const categoryNames = { work: "Praca", home: "Dom", study: "Nauka", personal: "Osobiste" };
            const priorityNames = { low: "Niski", medium: "Średni", high: "Wysoki" };
            const priorityClass = `priority-${task.priority}`;
            const statusNames = { todo: "Do zrobienia", progress: "W trakcie", done: "Zrobione" };
            const statusClass = `status-${task.status}`;
            
            return `
                <div class="task-item" data-id="${task.id}">
                    <input type="checkbox" class="task-checkbox" ${task.status === "done" ? "checked" : ""} data-id="${task.id}">
                    <div class="task-title ${task.status === "done" ? "completed" : ""}">${task.title}</div>
                    <div><span class="category-badge ${categoryClass}">${categoryNames[task.category]}</span></div>
                    <div class="${priorityClass}">${priorityNames[task.priority]}</div>
                    <div><span class="status-badge ${statusClass}">${statusNames[task.status]}</span></div>
                    <div class="task-date">${task.date || "Brak terminu"}</div>
                    <div class="task-actions">
                        <button class="edit-btn" data-id="${task.id}">✏️</button>
                        <button class="delete-btn" data-id="${task.id}">🗑️</button>
                    </div>
                </div>
            `;
        }).join("");
        
        // Eventy dla checkboxów
        document.querySelectorAll(".task-checkbox").forEach(cb => {
            cb.addEventListener("change", (e) => {
                const id = parseInt(cb.dataset.id);
                const task = tasks.find(t => t.id === id);
                if (task) {
                    task.status = cb.checked ? "done" : "todo";
                    saveTasks();
                    renderAll();
                }
            });
        });
        
        // Eventy dla edycji
        document.querySelectorAll(".edit-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.dataset.id);
                openEditModal(id);
            });
        });
        
        // Eventy dla usuwania
        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.addEventListener("click", (e) => {
                const id = parseInt(btn.dataset.id);
                if (confirm("Czy na pewno chcesz usunąć to zadanie?")) {
                    tasks = tasks.filter(t => t.id !== id);
                    saveTasks();
                    renderAll();
                }
            });
        });
    }
    
    function renderAll() {
        renderTasks();
        updateStats();
    }

    // ==================== MODAL ====================
    const modal = document.getElementById("taskModal");
    
    function openAddModal() {
        editingId = null;
        document.getElementById("modalTitle").innerText = "➕ Dodaj zadanie";
        document.getElementById("taskTitle").value = "";
        document.getElementById("taskDesc").value = "";
        document.getElementById("taskCategory").value = "work";
        document.getElementById("taskPriority").value = "medium";
        document.getElementById("taskStatus").value = "todo";
        document.getElementById("taskDate").value = new Date().toISOString().split('T')[0];
        modal.style.display = "flex";
    }
    
    function openEditModal(id) {
        const task = tasks.find(t => t.id === id);
        if (!task) return;
        editingId = id;
        document.getElementById("modalTitle").innerText = "✏️ Edytuj zadanie";
        document.getElementById("taskTitle").value = task.title;
        document.getElementById("taskDesc").value = task.description || "";
        document.getElementById("taskCategory").value = task.category;
        document.getElementById("taskPriority").value = task.priority;
        document.getElementById("taskStatus").value = task.status;
        document.getElementById("taskDate").value = task.date || "";
        modal.style.display = "flex";
    }
    
    function saveTask() {
        const title = document.getElementById("taskTitle").value.trim();
        if (!title) {
            alert("Podaj nazwę zadania");
            return;
        }
        
        const newTask = {
            title: title,
            description: document.getElementById("taskDesc").value,
            category: document.getElementById("taskCategory").value,
            priority: document.getElementById("taskPriority").value,
            status: document.getElementById("taskStatus").value,
            date: document.getElementById("taskDate").value
        };
        
        if (editingId === null) {
            // Dodaj nowe
            newTask.id = getNextId();
            tasks.push(newTask);
        } else {
            // Edytuj
            const index = tasks.findIndex(t => t.id === editingId);
            if (index !== -1) {
                newTask.id = editingId;
                tasks[index] = newTask;
            }
        }
        
        saveTasks();
        renderAll();
        modal.style.display = "none";
    }
    
    // ==================== FILTRY ====================
    function setupFilters() {
        // Kategorie
        document.querySelectorAll("#categoryFilters .filter-chip").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll("#categoryFilters .filter-chip").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentCategoryFilter = btn.dataset.cat;
                renderTasks();
            });
        });
        
        // Statusy
        document.querySelectorAll("#statusFilters .filter-chip").forEach(btn => {
            btn.addEventListener("click", () => {
                document.querySelectorAll("#statusFilters .filter-chip").forEach(b => b.classList.remove("active"));
                btn.classList.add("active");
                currentStatusFilter = btn.dataset.status;
                renderTasks();
            });
        });
        
        // Sortowanie
        document.getElementById("sortSelect").addEventListener("change", (e) => {
            currentSort = e.target.value;
            renderTasks();
        });
        
        // Wyszukiwanie
        document.getElementById("searchInput").addEventListener("input", (e) => {
            searchQuery = e.target.value;
            renderTasks();
        });
    }
    
    // ==================== DARK MODE ====================
    function setupTheme() {
        const btn = document.getElementById("themeToggle");
        const saved = localStorage.getItem("taskflow_theme");
        if (saved === "dark") {
            document.body.classList.add("dark");
            btn.textContent = "☀️";
        }
        btn.addEventListener("click", () => {
            document.body.classList.toggle("dark");
            const isDark = document.body.classList.contains("dark");
            btn.textContent = isDark ? "☀️" : "🌙";
            localStorage.setItem("taskflow_theme", isDark ? "dark" : "light");
        });
    }
    
    // ==================== START ====================
    document.addEventListener("DOMContentLoaded", () => {
        loadTasks();
        setupFilters();
        setupTheme();
        
        document.getElementById("openAddModal").addEventListener("click", openAddModal);
        document.getElementById("closeModal").addEventListener("click", () => modal.style.display = "none");
        document.getElementById("saveTask").addEventListener("click", saveTask);
        window.addEventListener("click", (e) => {
            if (e.target === modal) modal.style.display = "none";
        });
    });
</script>
</body>
</html>
